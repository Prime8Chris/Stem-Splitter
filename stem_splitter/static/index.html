<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stem Splitter</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <a href="#mainContent" class="skip-link">Skip to main content</a>
  <div class="bg"><div class="bg-orb"></div></div>

  <div class="app">
    <div class="header">
      <img id="logo" src="http://127.0.0.1:__AUDIO_PORT__/logo.png" alt="Stem Splitter">
      <button class="btn-settings" onclick="toggleSettings()" aria-label="Open settings">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
    </div>

    <!-- Settings Panel (slides in from right) -->
    <div class="settings-panel" id="settingsPanel" role="dialog" aria-label="Settings"></div>

    <main id="mainContent">

    <div class="drop-zone glass empty" id="dropZone" onclick="addFiles()" role="button" aria-label="Drop audio files here or click to browse">
      <div class="drop-icon"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg></div>
      <div class="drop-text">Drop audio files here or <span>browse</span></div>
    </div>

    <div class="controls-grid">
      <div class="control-group glass">
        <div class="control-label">Model</div>
        <select id="modelSelect" aria-label="Separation model">
          <option value="htdemucs">4 stems &mdash; vocals, drums, bass, other</option>
          <option value="htdemucs_6s">6 stems &mdash; vocals, drums, bass, guitar, piano, other</option>
        </select>
      </div>
      <div class="control-group glass">
        <div class="control-label">Output</div>
        <div class="output-row">
          <div class="output-path" id="outputPath" title="" aria-label="Output directory"></div>
          <button class="btn-browse" id="browseBtn" onclick="openOutput()" aria-label="Choose output folder">Open</button>
        </div>
      </div>
      <div class="control-group glass">
        <div class="control-label">Device</div>
        <select id="deviceSelect" aria-label="Processing device">
          <option value="cpu">CPU</option>
          <option value="cuda">GPU</option>
        </select>
      </div>
      <div class="action-buttons">
        <button class="btn-split" id="splitBtn" onclick="startSplit()" aria-label="Start stem separation">
          Split Stems
        </button>
        <button class="btn-cancel" id="cancelBtn" onclick="cancelSplit()" aria-label="Cancel stem separation">
          Cancel
        </button>
      </div>
    </div>

    <div class="progress-section" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">
      <div class="progress-bar-track">
        <div class="progress-bar-fill" id="progressFill"></div>
      </div>
      <div class="progress-info">
        <div class="progress-status" id="statusText" aria-live="polite">Ready</div>
        <div class="progress-pct" id="progressPct"></div>
      </div>
    </div>
    </main>
  </div>

  <input type="file" id="fileInput" multiple accept="audio/*,.mp3,.wav,.flac,.ogg,.m4a,.wma,.aiff,.au">
  <div class="toast" id="toast" role="alert" aria-live="assertive"></div>

  <!-- Onboarding overlay (hidden by default) -->
  <div class="onboarding-overlay" id="onboarding" style="display:none;">
    <div class="onboarding-card">
      <h2>Demucs Not Found</h2>
      <p>Stem Splitter requires Demucs to separate audio. Install it with:</p>
      <code>pip install demucs</code>
      <p style="margin-top:16px; font-size:11px; color:rgba(255,255,255,0.4);">Restart the app after installing.</p>
    </div>
  </div>

<script src="js/app.js"></script>
<script src="js/waveform.js"></script>
<script src="js/eq.js"></script>
<script src="js/mixer.js"></script>
<script src="js/settings.js"></script>
<script src="js/render.js"></script>
</body>
</html>
