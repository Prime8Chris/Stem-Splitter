name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Python tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pywebview
          pip install -r requirements.txt

      - name: Run backend tests
        run: python -m pytest stem_splitter/tests/ -v

  frontend:
    name: JS tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install and test
        working-directory: stem_splitter/static/js
        run: |
          npm install
          npm test

  imports:
    name: Import check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pywebview
          pip install -r requirements.txt

      - name: Verify all modules import cleanly
        run: |
          python -c "from stem_splitter.config import DATA_DIR, DEFAULT_OUTPUT, CREATE_NO_WINDOW, PYTHON_EXE; print('config OK:', DATA_DIR)"
          python -c "from stem_splitter.server import AudioHandler, ThreadingHTTPServer; print('server OK')"
          python -c "from stem_splitter.settings import load_settings; print('settings OK')"
          python -c "from stem_splitter.processing import DemucsProcessor; print('processing OK')"
          python -c "from stem_splitter.api import Api, _open_folder, _open_file_in_folder; print('api OK')"
